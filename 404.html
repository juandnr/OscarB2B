<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Página no encontrada — Oscar B2B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--gold:#F5A623;--bg:#0a0a0a;}
        body{background:var(--bg);color:#fff;font-family:'Space Grotesk',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
        .code{font-size:clamp(5rem,20vw,10rem);font-weight:700;line-height:1;color:var(--gold);letter-spacing:-.04em;}
        .msg{font-size:clamp(1.1rem,3vw,1.5rem);color:rgba(255,255,255,.55);margin:.75rem 0 2.5rem;line-height:1.5;}
        .btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--gold);color:#000;font-family:inherit;font-size:.9rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;padding:.85rem 2rem;border-radius:8px;}
        .btn:hover{opacity:.88;}
    </style>
</head>
<body>
    <div class="code">404</div>
    <p class="msg">Esta página no existe.<br>Puede que el link esté roto o la URL cambió.</p>
    <a href="/" class="btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M14 8H2M6 4L2 8l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Volver al inicio
    </a>
</body>
</html>
