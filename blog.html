<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog — Oscar B2B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#F5A623;--bg:#0a0a0a;--surf:#141414;--bdr:rgba(255,255,255,.07);--mute:rgba(255,255,255,.38);}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:22px 52px;border-bottom:1px solid var(--bdr);}
.logo{display:flex;align-items:baseline;gap:7px;line-height:1;text-decoration:none;}
.lo{font-family:'Anton',sans-serif;font-size:18pt;text-transform:uppercase;letter-spacing:-.01em;color:#fff;}
.lb{font-family:'Playfair Display',serif;font-style:italic;font-size:15pt;color:var(--g);}
.back-link{display:inline-flex;align-items:center;gap:7px;font-size:7.5pt;letter-spacing:.28em;text-transform:uppercase;color:var(--mute);text-decoration:none;transition:color .18s;}
.back-link:hover{color:var(--g);}
.hero{padding:56px 52px 40px;max-width:1300px;margin:0 auto;width:100%;}
.hero-ey{font-size:7.5pt;letter-spacing:.36em;text-transform:uppercase;color:var(--g);margin-bottom:14px;display:flex;align-items:center;gap:11px;}
.hero-ey::before{content:"";display:block;width:22px;height:1.5px;background:var(--g);}
.hero h1{font-family:'Anton',sans-serif;font-size:68pt;text-transform:uppercase;line-height:1.05;letter-spacing:-.01em;}
.hero-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:18pt;color:var(--mute);margin-top:14px;line-height:1.45;}
.gw{flex:1;padding:0 52px 64px;max-width:1300px;margin:0 auto;width:100%;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:72px 32px;background:var(--surf);border:1px dashed var(--bdr);border-radius:10px;text-align:center;}
.empty-ico{width:52px;height:52px;border-radius:12px;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.18);display:flex;align-items:center;justify-content:center;color:var(--g);}
.empty h3{font-family:'Anton',sans-serif;font-size:20pt;text-transform:uppercase;}
.empty p{font-size:10.5pt;color:var(--mute);max-width:380px;line-height:1.65;}
footer{border-top:1px solid var(--bdr);padding:16px 52px;display:flex;justify-content:space-between;align-items:center;}
.fl{font-size:7.5pt;letter-spacing:.22em;text-transform:uppercase;color:var(--mute);}
.fd{width:6px;height:6px;border-radius:50%;background:var(--g);}
@media(max-width:980px){.hero h1{font-size:52pt;}nav,.hero,.gw,footer{padding-left:28px;padding-right:28px;}}
@media(max-width:600px){.hero h1{font-size:38pt;}nav,.hero,.gw,footer{padding-left:18px;padding-right:18px;}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo"><span class="lo">Oscar</span><span class="lb">B2B</span></a>
  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7H2M6 3L2 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Regresar
  </a>
</nav>

<div class="hero">
  <div class="hero-ey">Blog</div>
  <h1>LO QUE<br>APRENDO</h1>
  <p class="hero-sub">Ventas, metodología e inteligencia artificial<br>para equipos B2B modernos.</p>
</div>

<div class="gw">
  <div class="grid">
    <div class="empty">
      <div class="empty-ico">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <h3>Próximamente</h3>
      <p>Estoy preparando los primeros artículos. Contenido práctico sobre cómo construir equipos de ventas con metodología e inteligencia artificial.</p>
    </div>
  </div>
</div>

<footer>
  <span class="fl">Oscar B2B · oscarb2b.com</span>
  <div class="fd"></div>
</footer>

</body>
</html>
